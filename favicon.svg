<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Vibrant blue to teal gradient -->
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>
    
    <!-- High-intensity glow filter -->
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Thick, smooth, glowing ECG Pulse Wave -->
  <path d="M 6 32 L 20 32 L 26 40 L 33 12 L 40 52 L 45 32 L 58 32" 
        fill="none" 
        stroke="url(#waveGrad)" 
        stroke-width="6.5" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#neonGlow)" />
        
  <!-- Glowing accent pulse dot -->
  <circle cx="58" cy="32" r="3.5" fill="#10B981" filter="url(#neonGlow)" />
</svg>
