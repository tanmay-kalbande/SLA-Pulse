<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Background Gradient matching the dark rail -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E2330" />
      <stop offset="100%" stop-color="#0F1115" />
    </linearGradient>
    
    <!-- White Logo Box Gradient -->
    <linearGradient id="logoBoxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F1F5F9" />
    </linearGradient>
    
    <!-- Pulse Line Gradient -->
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#0D9488" />
    </linearGradient>
    
    <!-- Glow filter for the pulse wave -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Dark outer background -->
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)" />
  <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" fill="none" stroke="#252930" stroke-opacity="0.5" />

  <!-- Logo base (the white square box from the brand logo) -->
  <rect x="12" y="12" width="40" height="40" rx="8" fill="url(#logoBoxGrad)" />
  <rect x="12" y="12" width="40" height="40" rx="8" fill="none" stroke="#CBD5E1" stroke-width="1" />

  <!-- SLA Text / Pulse Hybrid -->
  <text x="32" y="31" 
        font-family="monospace" 
        font-weight="900" 
        font-size="12" 
        fill="#16191F" 
        text-anchor="middle" 
        dominant-baseline="central"
        letter-spacing="0.5">SLA</text>

  <!-- Pulse line overlay weaving through the bottom of the logo box -->
  <path d="M 16 43 L 23 43 L 28 35 L 36 51 L 41 43 L 48 43" 
        fill="none" 
        stroke="url(#pulseGrad)" 
        stroke-width="3" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)" />
        
  <!-- Glowing pulse dot (the gear/hint indicator) -->
  <circle cx="48" cy="43" r="2" fill="#0D9488" />
</svg>
