<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#252A31" />
      <stop offset="100%" stop-color="#16191F" />
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="50%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#38BDF8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Premium rounded app-icon base -->
  <rect width="64" height="64" rx="16" fill="url(#bgGrad)" />
  <rect x="1" y="1" width="62" height="62" rx="15" fill="none" stroke="#4B5563" stroke-width="1" stroke-opacity="0.4" />
  
  <!-- Glowing ECG Pulse Wave -->
  <path d="M 10 32 L 20 32 L 27 16 L 37 48 L 44 32 L 54 32" 
        fill="none" 
        stroke="url(#pulseGrad)" 
        stroke-width="4.5" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        filter="url(#glow)" />
        
  <!-- Brand accent dot mimicking the UI logo -->
  <circle cx="52" cy="52" r="4.5" fill="#38BDF8" />
</svg>
